name: Top Gun Bracket Scanner

on:
  schedule:
    # This string of characters is cron syntax for "Every 5 minutes"
    - cron: '*/5 * * * *'
  workflow_dispatch: # This allows you to click a button to run it manually right now

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scanner script
        env:
          # This securely pulls your hidden webhook out of the vault
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scanner.py
