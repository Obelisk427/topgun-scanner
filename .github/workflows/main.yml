name: Top Gun Bracket Scanner

on:
  workflow_dispatch: # This is how cron-job.org triggers the run

jobs:
  scan:
    runs-on: ubuntu-latest
    
    # This gives the bot permission to save the memory file
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scanner script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scanner.py

      - name: Save memory file if schedule was found
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule_found.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Bot: Schedule found, saving memory marker" && git push)
